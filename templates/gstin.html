<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your GSTIN</title>
    <!-- This MUST be at the end of <body>, after your content -->
    <!-- Bootstrap 5.3 CDN (recommended for most people) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>


<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">GSTIN</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/index">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/gstin">GSTIN Status</a></li>
                            <li><a class="dropdown-item" href="/pan">GSTR-3B</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Other</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="d-flex justify-content-center align-items-center" style="height: 50vh;">

        <div class="card p-4 shadow rounded-4" style="width: 400px;">

            <h4 class="text-center mb-3">GSTIN Verification</h4>

            <input type="text" id="gstin" class="form-control mb-3" placeholder="Enter 15-digit GST Number">

            <button class="btn btn-primary w-100" onclick="verify()">Verify</button>

            <!-- ❌ sirf message ke liye -->
            <p id="message" class="mt-3 text-center"></p>

        </div>
    </div>

    <!-- ✅ table ke liye alag div (IMPORTANT) -->
    <div id="tableResult" class="container mt-4"></div>
    <script>
        function verify() {
            let gstinInput = document.getElementById("gstin");
            let gstin = gstinInput.value.trim().toUpperCase();

            // 🔄 Loader show
            document.getElementById("tableResult").innerHTML = `
        <div class="text-center mt-3">
            <div class="spinner-border text-primary"></div>
            <p>Processing...</p>
        </div>
    `;

            fetch(`/verify?gstin=${gstin}`)
                .then(res => res.json())
                .then(data => {

                    // clear input after search
                    gstinInput.value = "";

                    if (data.error) {
                        document.getElementById("tableResult").innerHTML =
                            `<p class="text-danger text-center">${data.error}</p>`;
                        return;
                    }

                    let d = data.data || data;

                    // ✅ Status badge
                    let status = d.sts || "N/A";
                    let badgeClass = status === "Active" ? "bg-success" : "bg-danger";

                    // Address – your API uses "adr", not "pradr.addr"
                    let address = d.adr || "Not available";

                    // Dates from meta
                    let activityDate = d.meta?.syncMasterDate || "N/A";
                    let lastFilingDate = d.meta?.syncReturnDate || "N/A";

                    let output = `
                            <div class="d-flex justify-content-center">

            <div class="card shadow rounded-4 p-4" style="width: 600px;">

                <!-- ✅ Heading -->
                <h5 class="mb-3 text-center">
                    Search Result based on GSTIN/UIN : ${gstin}
                </h5>

                <!-- ✅ Table -->
                <table class="table table-bordered text-center">
                    <tr>
                        <th>Name</th>
                        <td>${d.lgnm || "N/A"}</td>
                    </tr>
                    <tr>
                    <tr>
                        <th>Trade Name</th>
                        <td>${d.tradeName || "N/A"}</td>                    
                    </tr>
                    <tr>
                        <th>PAN Number</th>
                        <td>${d.pan || "N/A"}</td>
                    </tr>             

                    <tr>
                        <th>Status</th>
                        <td>
                            <span class="badge ${badgeClass}">
                                ${status}
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <th>Registration Date</th>
                        <td>${d.rgdt || "N/A"}</td>
                    </tr>
                    <tr>
                        <th>Address</th>
                        <td>${address}</td>
                    </tr>
                    <tr>
                        <th>Company Category</th>
                        <td>${d.compCategory || "N/A"}</td>
                    </tr>
                    <tr>
                        <th>e-Invoice Mandated</th>
                        <td>${d.mandatedeInvoice || "N/A"}</td>
                    </tr>
                    <tr>
                        <th>Activity Date<br><small>(Master Data Sync)</small></th>
                        <td>${activityDate}</td>
                    </tr>
                    <tr>
                        <th>Last Filing Date<br><small>(Return Sync)</small></th>
                        <td>${lastFilingDate}</td>
                    </tr>
                </table>

            </div>

        </div>
        `;

                    document.getElementById("tableResult").innerHTML = output;
                })
                .catch(err => {
                    document.getElementById("tableResult").innerHTML =
                        `<p class="text-danger text-center">Error: ${err}</p>`;
                });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>

</html>
